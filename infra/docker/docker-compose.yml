services:
  postgres:
    image: postgres:16-alpine
    container_name: qorvi-postgres
    environment:
      POSTGRES_DB: qorvi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - qorvi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qorvi"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5.24-community
    container_name: qorvi-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "8687:7687"
    volumes:
      - qorvi_neo4j_data:/data
      - qorvi_neo4j_logs:/logs
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.4-alpine
    container_name: qorvi-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - qorvi_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  qorvi_postgres_data:
  qorvi_neo4j_data:
  qorvi_neo4j_logs:
  qorvi_redis_data:
