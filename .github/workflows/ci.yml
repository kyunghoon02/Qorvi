name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint:web

      - name: Typecheck
        run: corepack pnpm typecheck:web

      - name: Test
        run: corepack pnpm test:web

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache-dependency-path: "**/go.sum"

      - name: Vet
        run: |
          set -euo pipefail
          for dir in apps/api apps/workers packages/domain packages/config packages/providers packages/db packages/intelligence packages/ops packages/billing; do
            (cd "$dir" && go vet ./...)
          done

      - name: Test
        run: |
          set -euo pipefail
          for dir in apps/api apps/workers packages/domain packages/config packages/providers packages/db packages/intelligence packages/ops packages/billing; do
            (cd "$dir" && go test ./...)
          done
